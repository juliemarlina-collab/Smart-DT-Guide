<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create account — Smart DT Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/smartdt-guide.css">
<style>
  .auth{ max-width:520px; margin:0 auto; padding: 24px var(--page-x) calc(40px + env(safe-area-inset-bottom)); }
  .auth-top{ display:flex; align-items:center; gap:12px; margin-bottom:18px; }
  .back-btn{ width:44px; height:44px; border-radius:var(--r-pill); background:var(--panel-2); border:1px solid var(--line); display:grid; place-items:center; color:var(--text); font-size:18px; text-decoration:none; flex:0 0 auto; }
  .auth-logo img{ height:34px; width:auto; display:block; }
  .auth-head{ margin:6px 0 20px; }
  .auth-head h1{ font-size:clamp(26px,5vw,32px); font-weight:900; letter-spacing:-.02em; }
  .auth-head p{ color:var(--muted); font-size:14.5px; margin-top:6px; }
  .field-err{ color:var(--pink); font-size:12.5px; font-weight:700; margin-top:5px; min-height:16px; }
  input.invalid, select.invalid{ border-color:var(--pink); box-shadow:0 0 0 4px rgba(226,76,196,.12); }
  .form-note{ font-size:12.5px; color:var(--faint); margin-top:4px; }
  .auth-foot{ text-align:center; font-size:14px; color:var(--muted); font-weight:600; margin-top:18px; }
  .auth-foot a{ font-weight:800; }
  .banner{ display:none; border-radius:var(--r-md); padding:13px 15px; font-size:14px; font-weight:700; margin-bottom:16px; }
  .banner.ok{ display:block; background:rgba(47,208,123,.14); border:1px solid rgba(47,208,123,.4); color:var(--green); }
</style>
</head>
<body>
<div class="app">
  <div class="auth">

    <div class="auth-top">
      <a class="back-btn" href="welcome.html" aria-label="Back">←</a>
      <span class="auth-logo">
        <img src="assets/brand/logo-full.png" alt="Smart DT Guide"
             onerror="this.replaceWith(Object.assign(document.createElement('span'),{innerHTML:'<b style=&quot;color:var(--orange)&quot;>Smart</b> <b style=&quot;color:var(--teal)&quot;>DT</b> <b style=&quot;color:var(--yellow)&quot;>Guide</b>',style:'font-size:18px'}))">
      </span>
    </div>

    <div class="auth-head">
      <h1>Create your account</h1>
      <p>Set up your team profile to start the Design Thinking journey.</p>
    </div>

    <div class="banner ok" id="okBanner">Account created. Taking you in…</div>

    <form id="regForm" novalidate>
      <label for="name">Full name</label>
      <input id="name" type="text" autocomplete="name" placeholder="e.g. Ahmad bin Ismail">
      <div class="field-err" data-for="name"></div>

      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@student.edu.my">
      <div class="field-err" data-for="email"></div>

      <label for="reg">Registration number</label>
      <input id="reg" type="text" placeholder="e.g. 01DKA23F1001">
      <div class="field-err" data-for="reg"></div>

      <label for="class">Class</label>
      <input id="class" type="text" placeholder="e.g. DKA5A">
      <div class="field-err" data-for="class"></div>

      <label for="project">Project name</label>
      <input id="project" type="text" placeholder="Your team's project title">
      <div class="field-err" data-for="project"></div>

      <label for="team">Team members</label>
      <textarea id="team" placeholder="List your team members, one per line"></textarea>
      <div class="field-err" data-for="team"></div>

      <button class="btn primary" type="submit" style="margin-top:20px">Create account →</button>
    </form>

    <p class="auth-foot">Already registered? <a href="login.html">Sign in</a></p>

  </div>
</div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const form = $('#regForm');
  const fields = {
    name:    {el:$('#name'),    key:'df_student_name', label:'name'},
    email:   {el:$('#email'),   key:'df_email',        label:'email'},
    reg:     {el:$('#reg'),     key:'df_reg_no',       label:'registration number'},
    class:   {el:$('#class'),   key:'df_class',        label:'class'},
    project: {el:$('#project'), key:'df_project_name', label:'project name'},
    team:    {el:$('#team'),    key:'df_team',         label:'team members'}
  };
  const showErr = (id,msg)=>{ document.querySelector(`.field-err[data-for="${id}"]`).textContent=msg||''; fields[id].el.classList.toggle('invalid',!!msg); };
  const emailOk = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

  // prefill if returning
  Object.entries(fields).forEach(([id,f])=>{ const v=localStorage.getItem(f.key); if(v) f.el.value=v; });

  form.addEventListener('submit', e=>{
    e.preventDefault();
    let ok=true;
    Object.entries(fields).forEach(([id,f])=>{
      const v=f.el.value.trim();
      if(!v){ showErr(id,`Please enter your ${f.label}.`); ok=false; }
      else if(id==='email' && !emailOk(v)){ showErr(id,'Enter a valid email address.'); ok=false; }
      else showErr(id,'');
    });
    if(!ok){ const first=form.querySelector('.invalid'); first && first.scrollIntoView({behavior:'smooth',block:'center'}); return; }

    // local-first save (same keys as the wider app)
    Object.values(fields).forEach(f=> localStorage.setItem(f.key, f.el.value.trim()));
    localStorage.setItem('df_registered','true');

    $('#okBanner').classList.add('ok');
    $('#okBanner').scrollIntoView({behavior:'smooth',block:'center'});
    setTimeout(()=>{ location.href='dashboard.html'; }, 900);
  });
})();
</script>
</body>
</html>
