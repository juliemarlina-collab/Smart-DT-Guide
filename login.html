<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — Smart DT Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/smartdt-guide.css">
<style>
  .auth{ max-width:460px; margin:0 auto; padding: 24px var(--page-x) calc(40px + env(safe-area-inset-bottom)); min-height:100vh; display:flex; flex-direction:column; }
  .auth-top{ display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .back-btn{ width:44px; height:44px; border-radius:var(--r-pill); background:var(--panel-2); border:1px solid var(--line); display:grid; place-items:center; color:var(--text); font-size:18px; text-decoration:none; flex:0 0 auto; }
  .auth-logo img{ height:34px; width:auto; display:block; }
  .auth-center{ margin:auto 0; }
  .auth-head{ text-align:center; margin:0 0 24px; }
  .auth-head img{ width:min(220px,60vw); height:auto; margin:0 auto 18px; display:block; }
  .auth-head h1{ font-size:clamp(24px,5vw,30px); font-weight:900; letter-spacing:-.02em; }
  .auth-head p{ color:var(--muted); font-size:14.5px; margin-top:6px; }
  .field-err{ color:var(--pink); font-size:12.5px; font-weight:700; margin-top:5px; min-height:16px; }
  input.invalid{ border-color:var(--pink); box-shadow:0 0 0 4px rgba(226,76,196,.12); }
  .banner{ display:none; border-radius:var(--r-md); padding:13px 15px; font-size:14px; font-weight:700; margin-bottom:16px; }
  .banner.err{ display:block; background:rgba(226,76,196,.12); border:1px solid rgba(226,76,196,.4); color:#f0a6e0; }
  .auth-foot{ text-align:center; font-size:14px; color:var(--muted); font-weight:600; margin-top:20px; }
  .auth-foot a{ font-weight:800; }
</style>
</head>
<body>
<div class="app">
  <div class="auth">

    <div class="auth-top">
      <a class="back-btn" href="welcome.html" aria-label="Back">←</a>
      <span class="auth-logo">
        <img src="assets/brand/logo-full.png" alt="Smart DT Guide"
             onerror="this.replaceWith(Object.assign(document.createElement('span'),{innerHTML:'<b style=&quot;color:var(--orange)&quot;>Smart</b> <b style=&quot;color:var(--teal)&quot;>DT</b> <b style=&quot;color:var(--yellow)&quot;>Guide</b>',style:'font-size:18px'}))">
      </span>
    </div>

    <div class="auth-center">
      <div class="auth-head">
        <h1>Welcome back</h1>
        <p>Sign in to continue your journey.</p>
      </div>

      <div class="banner err" id="errBanner">We couldn't find that account. Check your details or create one.</div>

      <form id="loginForm" novalidate>
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@student.edu.my">
        <div class="field-err" data-for="email"></div>

        <label for="reg">Registration number</label>
        <input id="reg" type="text" placeholder="e.g. 01DKA23F1001">
        <div class="field-err" data-for="reg"></div>

        <button class="btn primary" type="submit" style="margin-top:20px">Sign in →</button>
      </form>

      <p class="auth-foot">New here? <a href="registration.html">Create an account</a></p>
    </div>

  </div>
</div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const form = $('#loginForm');
  const emailEl=$('#email'), regEl=$('#reg');
  const showErr=(id,msg)=>{ document.querySelector(`.field-err[data-for="${id}"]`).textContent=msg||''; (id==='email'?emailEl:regEl).classList.toggle('invalid',!!msg); };
  const emailOk = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

  if(localStorage.getItem('df_email')) emailEl.value=localStorage.getItem('df_email');

  form.addEventListener('submit', e=>{
    e.preventDefault();
    $('#errBanner').style.display='none';
    const email=emailEl.value.trim(), reg=regEl.value.trim();
    let ok=true;
    if(!email){ showErr('email','Please enter your email.'); ok=false; }
    else if(!emailOk(email)){ showErr('email','Enter a valid email address.'); ok=false; }
    else showErr('email','');
    if(!reg){ showErr('reg','Please enter your registration number.'); ok=false; }
    else showErr('reg','');
    if(!ok) return;

    // match against the locally-saved account (same keys as registration)
    const savedEmail=(localStorage.getItem('df_email')||'').toLowerCase();
    const savedReg=(localStorage.getItem('df_reg_no')||'').toLowerCase();
    const registered=localStorage.getItem('df_registered')==='true';

    if(registered && email.toLowerCase()===savedEmail && reg.toLowerCase()===savedReg){
      location.href='dashboard.html';
    } else {
      $('#errBanner').style.display='block';
      $('#errBanner').scrollIntoView({behavior:'smooth',block:'center'});
    }
  });
})();
</script>
</body>
</html>
